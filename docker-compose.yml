services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: homeplant_db
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: fordjango26
    ports:
      - "5432:5432"
  
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    depends_on:
      - db

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web